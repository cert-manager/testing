presubmits:

  cert-manager/org:

  - name: pull-org-verify
    always_run: true
    max_concurrency: 4
    decorate: true
    spec:
      containers:
      - image: europe-west1-docker.pkg.dev/cert-manager-tests-trusted/cert-manager-infra-images/golang-dind:20260529-f029ca4-1.26
        args:
        - runner
        - make
        - verify
        resources:
          requests:
            cpu: 100m
            memory: 100Mi

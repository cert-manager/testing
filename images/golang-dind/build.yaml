name: golang-dind # Name of the image to be built

variants:
  "1.26":
    arguments:
      BASE_IMAGE: "europe-west1-docker.pkg.dev/cert-manager-tests-trusted/cert-manager-infra-images/make-dind:20260529-7f372af-trixie"
      GO_VERSION: "1.26.3"
      # curl -sL https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz | sha256sum

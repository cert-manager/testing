name: image-builder # Name of the image to be built

variants:
  gcloud-569:
    arguments:
      BASE_IMAGE: "europe-west1-docker.pkg.dev/cert-manager-tests-trusted/cert-manager-infra-images/golang-dind:20260527-69cbb03-1.26"
      CLOUD_SDK_VERSION: "569.0.0"

# Image names to be tagged and pushed
images:
- ${_REGISTRY}/${_NAME}:${_DATE_STAMP}-${_GIT_REF}-${CLOUD_SDK_VERSION}
- ${_REGISTRY}/${_NAME}:latest-${CLOUD_SDK_VERSION}

# Static kubeconfig for the untrusted GKE cluster (where ProwJobs run), auth
# via Workload Identity (gke-gcloud-auth-plugin). Replaces the Secret gencred
# used to rotate. Context name `default` makes this the default cluster in the
# merged $KUBECONFIG used by Prow components.
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: default
  name: kubeconfig-prow-untrusted
data:
  config: |
    apiVersion: v1
    kind: Config
    current-context: default
    clusters:
    - name: default
      cluster:
        server: https://34.22.140.171
        certificate-authority-data: 
    contexts:
    - name: default
      context:
        cluster: default
        user: default
    users:
    - name: default
      user:
        exec:
          apiVersion: client.authentication.k8s.io/v1beta1
          command: gke-gcloud-auth-plugin
          # Use the metadata-server ADC token (Workload Identity) directly,
          # bypassing the gcloud fallback (gcloud isn't in the Prow images).
          args:
          - --use_application_default_credentials
          provideClusterInfo: true

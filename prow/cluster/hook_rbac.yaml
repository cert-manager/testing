apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: default
  name: "hook"
  annotations:
    # Workload Identity binding to the GSA in cert-manager/infrastructure gcp/trusted_prow_controllers.tf.
    iam.gke.io/gcp-service-account: prow-hook@cert-manager-tests-trusted.iam.gserviceaccount.com
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  namespace: default
  name: "hook"
rules:
  - apiGroups:
      - "prow.k8s.io"
    resources:
      - prowjobs
    verbs:
      - create
      - get
      - list
      - update
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - get
      - update
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  namespace: default
  name: "hook"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "hook"
subjects:
- kind: ServiceAccount
  name: "hook"

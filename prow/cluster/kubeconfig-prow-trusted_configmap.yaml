# Static kubeconfig for the trusted GKE cluster, auth via Workload Identity
# (gke-gcloud-auth-plugin). Replaces the Secret gencred used to rotate.
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: default
  name: kubeconfig-prow-trusted
data:
  config: |
    apiVersion: v1
    kind: Config
    current-context: prow-trusted
    clusters:
    - name: prow-trusted
      cluster:
        server: https://35.241.164.165
        certificate-authority-data: 
    contexts:
    - name: prow-trusted
      context:
        cluster: prow-trusted
        user: prow-trusted
    users:
    - name: prow-trusted
      user:
        exec:
          apiVersion: client.authentication.k8s.io/v1beta1
          command: gke-gcloud-auth-plugin
          # Use the metadata-server ADC token (Workload Identity) directly,
          # bypassing the gcloud fallback (gcloud isn't in the Prow images).
          args:
          - --use_application_default_credentials
          provideClusterInfo: true
